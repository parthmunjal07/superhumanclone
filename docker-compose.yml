services:
  db:
    image: pgvector/pgvector:pg16
    container_name: meridian
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: parth
      POSTGRES_PASSWORD: meridian
      POSTGRES_DB: meridian
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: corsair-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
